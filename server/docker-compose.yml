---
services:
  db:
    image: postgres:16
    container_name: schedulelynx-db
    environment:
      POSTGRES_DB: schedulelynx
      POSTGRES_USER: schedulelynx
      POSTGRES_PASSWORD: schedulelynx
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedulelynx -d schedulelynx"]
      interval: 5s
      timeout: 3s
      retries: 20
