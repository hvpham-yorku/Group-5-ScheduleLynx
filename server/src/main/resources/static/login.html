<!doctype html>
<html>

<head>
  <title>You Login Template</title>
  <link rel="shortcut icon" href="images/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700" rel="stylesheet" />
  <link rel="stylesheet" href="fonts/ionicons/css/ionicons.css" />
  <link rel="stylesheet" href="fonts/font.css" />
  <link rel="stylesheet" href="css/bootstrap.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/media.css" />
</head>

<body>
  <div class="header-wrap">
    <div class="clearfix">
      <div class="logo">
        <a href="index.html"><img src="images/logo.svg" alt="" /></a>
      </div>
      <div class="menu">
        <div class="dropdown">
          <a class="dropdown-toggle hamburgler" href="#" role="button" data-toggle="dropdown">
            <span class="menu-icon">
              <div class="bun top"></div>
              <div class="meat"></div>
              <div class="bun bottom"></div>
            </span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <main class="cd-main">
    <section class="cd-section index visible">
      <div class="cd-content style1">
        <div class="login-box d-md-flex align-items-center">
          <div class="login-form-box">
            <div class="login-form-slider">
              <div class="login-slide slide login-style1">
                <div class="box-brand">
                  <div class="brand-name">ScheduleLynx</div>
                </div>
                <form id="loginForm">
                  <div class="form-group">
                    <input id="loginUsernameOrEmail" type="text" class="form-control" placeholder="Username or email"
                      aria-label="Username or email" required />
                  </div>
                  <div class="form-group">
                    <input id="loginPassword" type="password" class="form-control" placeholder="Password"
                      aria-label="Password" required />
                  </div>
                  <div class="form-group">
                    <div class="custom-control custom-checkbox">
                      <input type="checkbox" class="custom-control-input" id="customCheck1" />
                      <label class="custom-control-label" for="customCheck1">Remember me</label>
                    </div>
                  </div>
                  <div class="form-group">
                    <input type="submit" class="submit" value="Login" />
                  </div>
                </form>
                <div class="sign-up-txt">
                  Don't have an account?
                  <a href="javascript:;" class="sign-up-click">Sign Up</a>
                </div>

                <div class="forgot-txt">
                  <a href="javascript:;" class="forgot-password-click">Forgot password?</a>
                </div>

                <div class="login-with">
                  <h7>Login with your social</h7>
                  <ul class="social-login-btn">
                    <li class="facebook-btn">
                      <a href="#"><i class="ion-social-facebook"></i></a>
                    </li>
                    <li class="twitter-btn">
                      <a href="#" aria-label="Twitter">
                        <svg class="w-3 h-3 text-gray-800 dark:text-white" aria-hidden="true"
                          xmlns="http://www.w3.org/2000/svg" viewBox="-16 -16 55 55" fill="currentColor">
                          <path
                            d="M13.795 10.533 20.68 2h-3.073l-5.255 6.517L7.69 2H1l7.806 10.91L1.47 22h3.074l5.705-7.07L15.31 22H22l-8.205-11.467Zm-2.38 2.95L9.97 11.464 4.36 3.627h2.31l4.528 6.317 1.443 2.02 6.018 8.409h-2.31l-4.934-6.89Z" />
                        </svg>
                      </a>
                    </li>
                    <li class="google-btn">
                      <a href="#"><img src="images/google.svg" /></a>
                    </li>

                    <footer class="footer">
                      <div class="container">
                        <h6>
                          <br />
                          &copy; 2026 ScheduleLynx.
                        </h6>
                      </div>
                    </footer>
                  </ul>
                </div>
              </div>

              <div class="signup-slide slide login-style1">
                <div class="d-flex height-100-percentage">
                  <div class="align-self-center width-100-percentage">
                    <div class="box-brand">
                      <div class="brand-name">ScheduleLynx</div>
                    </div>
                    <form id="signupForm">
                      <div class="form-group">
                        <label class="label">Full Name</label>
                        <input id="signupFullName" type="text" class="form-control" required />
                      </div>
                      <div class="form-group">
                        <label class="label">Username</label>
                        <input id="signupUsername" type="text" class="form-control" required />
                      </div>
                      <div class="form-group">
                        <label class="label">Email</label>
                        <input id="signupEmail" type="email" class="form-control" required />
                      </div>
                      <div class="form-group">
                        <label class="label">Password</label>
                        <input id="signupPassword" type="password" class="form-control" required />
                      </div>
                      <div class="form-group">
                        <label class="label">Confirm Password</label>
                        <input id="signupConfirmPassword" type="password" class="form-control" required />
                      </div>
                      <div class="form-group padding-top-15px">
                        <input type="submit" class="submit" value="Sign Up" />
                      </div>
                    </form>
                    <div style="margin-top: 10px; text-align: center;">
                        <button type="button" class="btn-secondary login-click">
                          Back to Login
                        </button>
                      </div>
                  </div>
                </div>
              </div>

              <div class="forgot-password-slide slide login-style1">
                <div class="d-flex height-100-percentage">
                  <div class="align-self-center width-100-percentage">
                    <div class="box-brand">
                      <div class="brand-name">ScheduleLynx</div>
                    </div>
                    <form id="forgotForm">
                      <div class="form-group">
                        <h7>Enter your email address for instructions to reset
                          your password</h7>
                        <input type="email" class="form-control" required />
                      </div>
                      <div class="form-group">
                        <input type="submit" class="submit" value="Submit" />
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="cd-loading-bar" data-scale="1"></div>

  <script src="js/modernizr.js"></script>
  <script type="text/javascript" src="js/jquery.js"></script>
  <script type="text/javascript" src="js/popper.min.js"></script>
  <script type="text/javascript" src="js/bootstrap.js"></script>
  <script src="js/velocity.min.js"></script>

  <script type="text/javascript">
    jQuery(window).on("load", function () {
      jQuery(".pre-loader").fadeToggle("medium");
    });

    function saveLoggedInUser(user, rememberMe) {
      const localUser = {
        id: user.id,
        username: user.username,
        loginTime: new Date().toISOString(),
        rememberMe: rememberMe,
      };
      localStorage.setItem("schedulelynxUser", JSON.stringify(localUser));
    }

    async function apiRequest(url, method, body) {
      const response = await fetch(url, {
        method: method,
        headers: {
          "Content-Type": "application/json",
        },
        credentials: "same-origin",
        body: body ? JSON.stringify(body) : undefined,
      });

      if (response.status === 204) {
        return null;
      }

      let data = null;
      try {
        data = await response.json();
      } catch (e) {
        data = null;
      }

      if (!response.ok) {
        let message = "Request failed";
        if (data && data.message) message = data.message;
        else if (data && data.error) message = data.error;
        throw new Error(message);
      }

      return data;
    }

    jQuery(document).ready(function () {
      var signup_slide = jQuery(".signup-slide");
      var login_slide = jQuery(".login-slide");
      var forgot_slide = jQuery(".forgot-password-slide");

      jQuery(".sign-up-click").click(function () {
        signup_slide.velocity(
          { translateX: ["0%", "-100%"] },
          { display: "block" },
        );
        login_slide.velocity({ translateX: "100%" }, { display: "none" });
      });

      jQuery(".login-click").click(function () {
        login_slide.velocity(
          { translateX: ["0%", "-100%"] },
          { display: "block" },
        );
        signup_slide.velocity({ translateX: "100%" }, { display: "none" });
        forgot_slide.velocity({ translateX: "100%" }, { display: "none" });
      });

      jQuery(".forgot-password-click").click(function () {
        forgot_slide.velocity(
          { translateX: ["0%", "-100%"] },
          { display: "block" },
        );
        login_slide.velocity({ translateX: "100%" }, { display: "none" });
      });

      jQuery("#loginForm").submit(async function (e) {
        e.preventDefault();

        const usernameOrEmail = document
          .getElementById("loginUsernameOrEmail")
          .value.trim();
        const password = document.getElementById("loginPassword").value;
        const rememberMe = jQuery("#customCheck1").is(":checked");

        try {
          const user = await apiRequest("/api/auth/login", "POST", {
            usernameOrEmail: usernameOrEmail,
            password: password,
          });

          saveLoggedInUser(user, rememberMe);
          window.location.href = "home.html";
        } catch (err) {
          alert(err.message);
        }
      });

      jQuery("#signupForm").submit(async function (e) {
        e.preventDefault();

        const fullName = document
          .getElementById("signupFullName")
          .value.trim();
        const username = document
          .getElementById("signupUsername")
          .value.trim();
        const email = document.getElementById("signupEmail").value.trim();
        const pw = document.getElementById("signupPassword").value;
        const cpw = document.getElementById("signupConfirmPassword").value;

        if (pw !== cpw) {
          alert("Passwords do not match!");
          return;
        }

        try {
          const user = await apiRequest("/api/auth/register", "POST", {
            fullName: fullName,
            username: username,
            email: email,
            password: pw,
          });

          saveLoggedInUser(user, true);
          window.location.href = "home.html";
        } catch (err) {
          alert(err.message);
        }
      });

      jQuery("#forgotForm").submit(function (e) {
        e.preventDefault();
        alert("Forgot password is not implemented yet.");
        jQuery(".login-click").click();
      });

      var refresh = function () {
        jQuery(".floating-form .form-group .form-control").each(
          function (index, el) {
            var text_val = jQuery(this).val();
            if (text_val === "") {
              jQuery(this).parent().removeClass("has-value");
            } else {
              jQuery(this).parent().addClass("has-value");
            }
            jQuery(this)
              .focus(function () {
                jQuery(this).parent().addClass("is-focus");
                jQuery(this).parent().addClass("has-value");
              })
              .blur(function () {
                if (
                  jQuery(this).val() === "" ||
                  jQuery(this).val() === " " ||
                  jQuery(this).val() === null
                ) {
                  jQuery(this).parent().removeClass("is-focus");
                  jQuery(this).parent().removeClass("has-value");
                }
              });
          },
        );
      };
      refresh();
    });
  </script>
</body>

</html>
